name: Release Addon

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    # GITHUB_TOKEN defaults to read-only on modern repos. The packager
    # needs write access on `contents` to create / update the GitHub
    # release at the tag. Without this, the run fails late with
    # `403 Resource not accessible by integration` after a clean build.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog generation

      - name: Package and Release
        uses: BigWigsMods/packager@v2
        env:
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

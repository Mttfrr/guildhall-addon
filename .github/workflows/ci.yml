name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.1 + luarocks + luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lua5.1 liblua5.1-0-dev luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: luacheck .

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.1 + luarocks + busted
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lua5.1 liblua5.1-0-dev luarocks
          sudo luarocks install busted

      - name: Run busted
        run: busted --lua=lua5.1 spec/
